[pytest]
# Pytest configuration for Miliciano

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers
    --cov=miliciano-poc/bin
    --cov-report=html:coverage_html
    --cov-report=term-missing:skip-covered
    --cov-report=json
    -p no:warnings

markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, external dependencies)
    security: Security-focused tests
    slow: Slow-running tests

# Coverage options
[coverage:run]
source = miliciano-poc/bin
omit =
    */tests/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = coverage_html
